run_name: script1
description: >
  Prototype run for the Blonde Blazer Romance project. This run reads the project
  from /app/Input, prepares reusable style artifacts from scene images plus any
  optional supporting videos, and generates new clips through Kling multi-image
  image-to-video.

# Select the project folder under VIDEO_INPUT_DIR. Default VIDEO_INPUT_DIR is /app/Input.
input_folder: Blonde Blazer Romance

# Relative script paths are resolved inside the selected project first.
# This points to /app/Input/Blonde Blazer Romance/Scripts/script1.json.
script_file: Scripts/script1.json

# Output files are resolved relative to VIDEO_OUTPUT_DIR unless absolute.
output_file: script1_draft.mp4

# Artifacts are resolved inside PIPELINE_ARTIFACTS_DIR.
artifact_subdir: script1

# Optional. If relative, this resolves inside the selected project folder.
voiceover_file:

# Optional priority video pools for style analysis and future video-aware
# generation. Videos are never required; script assets decide what is used for
# each scene through use_asset and asset_type.
analysis_video_subfolders:
  - Supporting Data/general_assets/video
  - Supporting Data/closeups/videos
  - Supporting Data/broll/videos
  - Supporting Data/testimonials/videos

# Asset pools are relative to /app/Input/<input_folder>.
# The pipeline inventories images from these folders and analyzes active script
# video references when use_asset is true.
# Scripts decide generation references with:
#   use_asset: true/false
#   asset_type: image/video
#   role, label, prompt_hint, provider_use
asset_subfolders:
  reference_videos: Supporting Data/general_assets/video
  general_asset_videos: Supporting Data/general_assets/video
  general_asset_images: Supporting Data/general_assets/images
  closeup_videos: Supporting Data/closeups/videos
  closeup_images: Supporting Data/closeups/images
  facial_expressions_images: Supporting Data/facial_expressions/images
  facial_expressions_videos: Supporting Data/facial_expressions/videos
  broll_videos: Supporting Data/broll/videos
  broll_images: Supporting Data/broll/images
  testimonials_videos: Supporting Data/testimonials/videos
  portraits: Supporting Data/portraits
  product_shots: Supporting Data/product_shots
  three_d_models: Supporting Data/3d_models
  style_references: Supporting Data/style_references
  brand_assets: Supporting Data/brand_assets
  logos: Supporting Data/brand_assets/logos
  overlays: Supporting Data/overlays
  voiceovers: Supporting Data/audio/voiceovers
  music: Supporting Data/audio/music
  sfx: Supporting Data/audio/sfx
  documents: Supporting Data/docs
  storyboards: Supporting Data/docs/storyboards
  transcripts: Supporting Data/docs/transcripts

analysis:
  sample_frames: 12
  timeline_scan_points: 96
  transcribe_voice: false
  transcription_max_seconds: 90
  audio_analysis_max_seconds: 120

planning:
  honor_script_timing: true
  shot_duration_min_s: 2.0
  shot_duration_max_s: 12.0
  fallback_transition: crossfade
  include_scene_metadata_in_prompt: true

render:
  fps: 24
  output_width:
  output_height:

generation:
  # Fully generative providers only:
  # - auto: choose provider from models.video_generation_model preset
  # - openai_video: OpenAI Sora models
  # - google_veo: Google Vertex AI Veo models
  # - kling: Kling API models
  backend: auto

  # If true, scene reference images/videos are attached when the provider supports
  # that input. Their role/prompt_hint text is always added to the prompt.
  use_reference_input: true
  reference_mode: auto
  # Kling multi-image accepts 2-4 images. Keep this at 4 so each scene can pass
  # character, wardrobe, composition, and style/mood references together.
  reference_asset_limit: 4

  # For Sora/OpenAI and some Kling gateways. Leave blank to use preset defaults.
  # Sora examples: 720x1280, 1280x720, 1080x1920, 1920x1080 depending on model.
  video_size:

  # For Google Veo and Kling.
  video_aspect_ratio: "9:16"
  # Cheap Kling tests should stay at 540p. Increase to 720p or 1080p only after
  # the prompt/reference setup looks good.
  video_resolution: 540p

  # Keep this at 5 while testing Kling. Increase to 10 only when you need longer motion.
  # OpenAI: 4/8/12/16/20. Veo: 4/6/8. Kling: 5/10.
  video_duration_seconds: 5
  video_poll_interval_ms: 2000

  # Kling settings:
  # - multi_image_to_video: best default for your current scene references; sends 2-4 images
  # - image_to_video: single-image I2V fallback
  # - text_to_video: prompt-only fallback
  kling_generation_mode: multi_image_to_video
  # base64 lets local images work without hosting them. Use url if your gateway rejects base64.
  kling_local_image_transport: base64
  # Most Kling multi-image gateways use model_name; older text/image endpoints often use model.
  kling_model_field: model_name
  kling_multi_image_min_images: 2
  kling_multi_image_max_images: 4
  # Keep audio off while testing. Audio can double cost on some Kling gateways.
  kling_sound: false
  kling_mode: standard

  # Optional. If you set this, local image references can be converted to public URLs
  # for gateways that do not accept base64 image_list values.
  public_asset_base_url:

  # Google Veo settings. Leave google_output_gcs_uri blank to request inline video
  # bytes. If you set a gs:// bucket, the pipeline downloads with `gcloud storage cp`.
  google_output_gcs_uri:
  google_person_generation: allow_adult
  google_sample_count: 1
  seed:

models:
  transcription_model: whisper-1
  style_analysis_model: heuristic_v1

  # Friendly presets, roughly cheapest to most expensive:
  # - kling_2_5_turbo: very cheap scratchpad if available on your Kling account
  # - kling_2_6_std: cheap multi-image default, silent 5s/540p in this file
  # - veo_3_1_lite: low-cost Veo prompt tests
  # - veo_3_1_fast: medium-cost Veo with reference images
  # - kling_2_6_pro: stronger Kling pass
  # - sora_2: OpenAI frontier baseline
  # - veo_3_1_quality: stronger Veo pass
  # - sora_2_pro: highest-cost/final OpenAI pass
  video_generation_model: kling_2_6_std
  voice_generation_model:

selection:
  # Priority video pools kept for future/source-override analysis workflows.
  # Generation reference usage is controlled inside the script JSON, not here.
  preferred_reference_types:
    - reference_videos
    - general_asset_videos
    - general_asset_images
    - closeup_videos
    - broll_videos
  max_reference_videos:

workflow:
  save_resolved_run_config: true
  reuse_existing_analysis: false
