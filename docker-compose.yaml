services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-llm-dev
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    stdin_open: true
    tty: true
    environment:
      PYTHONUNBUFFERED: "1"
    command: bash

volumes:
  pip-cache: